name: Tonlib Android

on:
  pull_request:
    branches: [master, testnet]
    types: [opened, reopened, synchronize]
  push:
    branches: [master, testnet]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Check out repository
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Install system libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git cmake ninja-build automake libtool texinfo autoconf libgflags-dev \
        libreadline-dev pkg-config libgsl-dev python3 python3-dev libtool autoconf

    -  name: Install llvm-22
       run: |
        lsb_release -a
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
        echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
        sudo apt-get -y update
        sudo apt-get install -y clang-22

    - name: Cache Android NDK
      id: cache-android-ndk
      uses: actions/cache@v4
      with:
        path: android-ndk-r27d
        key: ${{ runner.os }}-${{ runner.arch }}-ubuntu-22.04-cache-android-ndk-${{ hashFiles('**/assembly/android/build-android-tonlib.sh') }}

    - name: Build TON
      run: |
        git submodule sync --recursive
        git submodule update
        cp assembly/android/build-android-tonlib.sh .
        chmod +x build-android-tonlib.sh
        ./build-android-tonlib.sh -a

    - name: Enable KVM for Android emulator
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Run Android smoke tests on emulator (API 30 / x86_64)
      uses: ReactiveCircus/android-emulator-runner@v2
      with:
        api-level: 30
        arch: x86_64
        target: google_apis
        profile: pixel_6
        emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-snapshot -no-snapshot-save
        emulator-boot-timeout: 900
        disable-animations: false
        disable-linux-hw-accel: false
        script: |
          ANDROID_NDK_ROOT="${GITHUB_WORKSPACE}/android-ndk-r27d" "${GITHUB_WORKSPACE}/example/android/smoke/build-smoke.sh" x86_64
          "${GITHUB_WORKSPACE}/example/android/smoke/run-smoke-adb.sh" x86_64
          "${GITHUB_WORKSPACE}/example/android/smoke/run-java-smoke-adb.sh" x86_64

    - name: Upload artifacts
      uses: actions/upload-artifact@master
      with:
        name: ton-android-tonlib
        path: artifacts
        retention-days: 14
